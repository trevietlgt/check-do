<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking DO</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #eef4ff, #f7f8fb);
  margin: 0;
}

.container {
  max-width: 560px;
  margin: auto;
  padding: 18px;
}

h1 {
  text-align: center;
  margin: 8px 0 18px;
  color: #0f172a;
  letter-spacing: 1px;
}

.box {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
}

label {
  font-weight: bold;
  color: #334155;
  display: block;
  margin-bottom: 8px;
}

input {
  width: 100%;
  padding: 17px;
  font-size: 21px;
  border-radius: 14px;
  border: 2px solid #dbe3ef;
  box-sizing: border-box;
  outline: none;
}

input:focus {
  border-color: #2563eb;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 17px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  background: #2563eb;
  color: white;
}

button.clear {
  background: #64748b;
}

.card {
  background: white;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
  border: 1px solid #e2e8f0;
}

.card-header {
  background: #1d4ed8;
  color: white;
  padding: 16px;
  text-align: center;
}

.card-header .small {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 4px;
}

.card-header .do-title {
  font-size: 22px;
  font-weight: bold;
  word-break: break-word;
}

.main-info {
  padding: 16px;
  display: grid;
  gap: 12px;
}

.info-box {
  border-radius: 18px;
  padding: 16px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
}

.info-box.primary {
  background: #ecfdf5;
  border-color: #bbf7d0;
}

.info-box.warning {
  background: #fff7ed;
  border-color: #fed7aa;
}

.info-label {
  font-size: 14px;
  font-weight: bold;
  color: #64748b;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.info-value {
  font-size: 25px;
  font-weight: bold;
  color: #0f172a;
  word-break: break-word;
}

.info-box.warning .info-value {
  color: #c2410c;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 0 16px 16px;
}

.detail-item {
  background: #f1f5f9;
  border-radius: 14px;
  padding: 10px;
  text-align: center;
}

.detail-label {
  font-size: 12px;
  color: #64748b;
  font-weight: bold;
  margin-bottom: 5px;
}

.detail-value {
  font-size: 15px;
  color: #0f172a;
  font-weight: bold;
}

.notfound, .status {
  text-align: center;
  color: #666;
  padding: 14px;
}

.notfound {
  color: #dc2626;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">
  <h1>TRACKING DO</h1>

  <div class="box">
    <label>Scan / nhập DO No.</label>
    <input id="doInput" placeholder="Scan DO..." autofocus autocomplete="off">
    <button onclick="searchDO()">Search DO</button>
    <button class="clear" onclick="clearSearch()">Clear</button>
  </div>

  <div id="result"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwvxLxdtMM8sktrZNlDb-Gco3MXiSVaLY-U7W072nzyolYx3FTtIZsAYl6QcVTaYM9vDQ/exec";
const SHEET_NAME = "DO BY DAY";

const DO_FIELD = "DO No.";

let allRows = [];
let scanTimer = null;

window.onload = async function () {
  await loadData();
  document.getElementById("doInput").focus();
};

document.getElementById("doInput").addEventListener("input", function () {
  clearTimeout(scanTimer);
  scanTimer = setTimeout(() => {
    const value = document.getElementById("doInput").value.trim();
    if (value.length >= 8) searchDO();
  }, 350);
});

document.getElementById("doInput").addEventListener("keydown", function (event) {
  if (event.key === "Enter") {
    event.preventDefault();
    searchDO();
  }
});

async function fetchRows() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "read", sheet: SHEET_NAME })
  });

  const data = await res.json();
  const rawRows = data.rows || [];

  return rawRows
    .slice(1)
    .map(normalizeRowFromLtoS)
    .filter(row => row[DO_FIELD]);
}

async function loadData() {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `<div class="status">Đang tải dữ liệu...</div>`;

  try {
    allRows = await fetchRows();
    resultDiv.innerHTML = `<div class="status">Sẵn sàng scan DO. Đã tải ${allRows.length} dòng.</div>`;
  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = `<div class="notfound">Không tải được dữ liệu Google Sheet</div>`;
  }
}

async function refreshData() {
  allRows = await fetchRows();
}

function normalizeRowFromLtoS(row) {
  if (Array.isArray(row)) {
    return {
      "DO No.": row[11] || "",
      "Ship-To ID": row[12] || "",
      "Shipto Nm": row[13] || "",
      "Số lượng": row[14] || "",
      "Picker": row[15] || "",
      "Packer": row[16] || "",
      "Số kiện": row[17] || "",
      "Vị trí": row[18] || ""
    };
  }

  return {
    "DO No.": pickValue(row, ["DO No.", "DO", "DO NO", "DO No", "L"]),
    "Ship-To ID": pickValue(row, ["Ship-To ID", "Ship To ID", "Shipto ID", "M"]),
    "Shipto Nm": pickValue(row, ["Shipto Nm", "Shipto Name", "Ship-To Name", "N"]),
    "Số lượng": pickValue(row, ["Số lượng", "So luong", "Qty", "Quantity", "O"]),
    "Picker": pickValue(row, ["Picker", "P"]),
    "Packer": pickValue(row, ["Packer", "Q"]),
    "Số kiện": pickValue(row, ["Số kiện", "So kien", "Carton", "R"]),
    "Vị trí": pickValue(row, ["Vị trí", "Vi tri", "Location", "S"])
  };
}

function pickValue(row, keys) {
  for (const key of keys) {
    if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
      return row[key];
    }
  }
  return "";
}

async function searchDO() {
  const doNo = document.getElementById("doInput").value.trim();
  if (!doNo) return;

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `<div class="status">Đang search DO...</div>`;

  try {
    await refreshData();
    const found = allRows.find(r => cleanDO(r[DO_FIELD]) === cleanDO(doNo));

    if (!found) {
      resultDiv.innerHTML = `<div class="notfound">Không tìm thấy DO: ${escapeHtml(doNo)}</div>`;
      return;
    }

    resultDiv.innerHTML = renderCard(found);
  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = `<div class="notfound">Lỗi search dữ liệu</div>`;
  }
}

function renderCard(row) {
  return `
    <div class="card">
      <div class="card-header">
        <div class="small">DO No.</div>
        <div class="do-title">${escapeHtml(row["DO No."] || "")}</div>
      </div>

      <div class="main-info">
        <div class="info-box primary">
          <div class="info-label">ID Store</div>
          <div class="info-value">${escapeHtml(row["Ship-To ID"] || "-")}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Số lượng</div>
          <div class="info-value">${escapeHtml(row["Số lượng"] || "-")}</div>
        </div>

        <div class="info-box warning">
          <div class="info-label">Vị trí</div>
          <div class="info-value">${escapeHtml(row["Vị trí"] || "-")}</div>
        </div>
      </div>

      
          <div class="detail-value">${escapeHtml(row["Picker"] || "-")}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Packer</div>
          <div class="detail-value">${escapeHtml(row["Packer"] || "-")}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Số kiện</div>
          <div class="detail-value">${escapeHtml(row["Số kiện"] || "-")}</div>
        </div>
      </div>
    </div>
  `;
}

function clearSearch() {
  document.getElementById("doInput").value = "";
  document.getElementById("result").innerHTML = `<div class="status">Sẵn sàng scan DO</div>`;
  document.getElementById("doInput").focus();
}

function cleanDO(value) {
  return String(value || "")
    .trim()
    .replace(/\.0$/, "")
    .replace(/\s+/g, "")
    .toUpperCase();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>
</body>
</html>

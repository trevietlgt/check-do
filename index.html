<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking DO</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #eef4ff, #f7f8fb);
  margin: 0;
}

.container {
  max-width: 560px;
  margin: auto;
  padding: 18px;
}

h1 {
  text-align: center;
  margin: 8px 0 18px;
  color: #0f172a;
  letter-spacing: 1px;
}

.box {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
}

label {
  font-weight: bold;
  color: #334155;
  display: block;
  margin-bottom: 8px;
}

input {
  width: 100%;
  padding: 17px;
  font-size: 21px;
  border-radius: 14px;
  border: 2px solid #dbe3ef;
  box-sizing: border-box;
  outline: none;
}

input:focus {
  border-color: #2563eb;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 17px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  background: #2563eb;
  color: white;
}

button.clear {
  background: #64748b;
}

button.reload {
  background: #16a34a;
}

.card {
  background: white;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
  border: 1px solid #e2e8f0;
}

.card-header {
  background: #1d4ed8;
  color: white;
  padding: 16px;
  text-align: center;
}

.card-header .small {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 4px;
}

.card-header .do-title {
  font-size: 22px;
  font-weight: bold;
  word-break: break-word;
}

.main-info {
  padding: 16px;
  display: grid;
  gap: 12px;
}

.info-box {
  border-radius: 18px;
  padding: 16px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
}

.info-box.primary {
  background: #ecfdf5;
  border-color: #bbf7d0;
}

.info-box.warning {
  background: #fff7ed;
  border-color: #fed7aa;
}

.info-label {
  font-size: 14px;
  font-weight: bold;
  color: #64748b;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.info-value {
  font-size: 27px;
  font-weight: bold;
  color: #0f172a;
  word-break: break-word;
}

.info-box.warning .info-value {
  color: #c2410c;
}

.store-name {
  font-size: 17px;
  color: #475569;
  font-weight: bold;
  margin-top: 6px;
}

.notfound, .status {
  text-align: center;
  color: #666;
  padding: 14px;
}

.notfound {
  color: #dc2626;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">
  <h1>TRACKING DO</h1>

  <div class="box">
    <label>Scan / nhập DO No.</label>
    <input id="doInput" placeholder="Scan DO..." autofocus autocomplete="off">
    <button onclick="searchDO()">Search DO</button>
    <button class="clear" onclick="clearSearch()">Clear</button>
    <button class="reload" onclick="loadData()">Tải lại dữ liệu</button>
  </div>

  <div id="result"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwvxLxdtMM8sktrZNlDb-Gco3MXiSVaLY-U7W072nzyolYx3FTtIZsAYl6QcVTaYM9vDQ/exec";
const SHEET_NAME = "DO BY DAY";
const DO_FIELD = "DO No.";

let allRows = [];
let rowMap = new Map();
let scanTimer = null;
let isLoading = false;
let lastScannedValue = "";
let lastSearchTime = 0;

window.onload = async function () {
  await loadData();
  document.getElementById("doInput").focus();
};

const doInput = document.getElementById("doInput");

doInput.addEventListener("input", function () {
  clearTimeout(scanTimer);
  scanTimer = setTimeout(() => autoSearchFromScan(), 180);
});

doInput.addEventListener("change", function () {
  autoSearchFromScan();
});

doInput.addEventListener("keydown", function (event) {
  if (event.key === "Enter" || event.key === "Tab") {
    event.preventDefault();
    autoSearchFromScan(true);
  }
});

// Fallback mạnh cho một số PDA chỉ đổ text vào input nhưng không trigger input/change ổn định.
setInterval(() => {
  autoSearchFromScan();
}, 400);

async function fetchRows() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "read", sheet: SHEET_NAME })
  });

  const data = await res.json();
  const rawRows = data.rows || [];

  return rawRows
    .slice(1)
    .map(normalizeRowFromLtoS)
    .filter(row => row[DO_FIELD]);
}

async function loadData() {
  if (isLoading) return;
  isLoading = true;

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `<div class="status">Đang tải dữ liệu...</div>`;

  try {
    allRows = await fetchRows();
    rowMap = new Map(allRows.map(row => [cleanDO(row[DO_FIELD]), row]));
    resultDiv.innerHTML = `<div class="status">Sẵn sàng scan DO. Đã tải ${allRows.length} dòng.</div>`;
  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = `<div class="notfound">Không tải được dữ liệu Google Sheet</div>`;
  }

  isLoading = false;
}

function normalizeRowFromLtoS(row) {
  if (Array.isArray(row)) {
    return {
      "DO No.": row[11] || "",
      "Ship-To ID": row[12] || "",
      "Shipto Nm": row[13] || "",
      "Số kiện": row[17] || "",
      "Vị trí": row[18] || ""
    };
  }

  return {
    "DO No.": pickValue(row, ["DO No.", "DO", "DO NO", "DO No", "L"]),
    "Ship-To ID": pickValue(row, ["Ship-To ID", "Ship To ID", "Shipto ID", "M"]),
    "Shipto Nm": pickValue(row, ["Shipto Nm", "Shipto Name", "Ship-To Name", "N"]),
    "Số kiện": pickValue(row, ["Số kiện", "So kien", "Carton", "R"]),
    "Vị trí": pickValue(row, ["Vị trí", "Vi tri", "Location", "S"])
  };
}

function pickValue(row, keys) {
  for (const key of keys) {
    if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
      return row[key];
    }
  }
  return "";
}

function autoSearchFromScan(force = false) {
  const value = document.getElementById("doInput").value.trim();
  const now = Date.now();

  if (!value) return;
  if (!force && value.length < 8) return;
  if (!force && value === lastScannedValue && now - lastSearchTime < 1500) return;

  lastScannedValue = value;
  lastSearchTime = now;
  searchDO();
}

function searchDO() {
  const doNo = document.getElementById("doInput").value.trim();
  if (!doNo) return;

  const resultDiv = document.getElementById("result");

  if (!rowMap.size) {
    resultDiv.innerHTML = `<div class="notfound">Dữ liệu chưa tải xong. Bấm Tải lại dữ liệu.</div>`;
    return;
  }

  const found = rowMap.get(cleanDO(doNo));

  if (!found) {
    resultDiv.innerHTML = `<div class="notfound">Không tìm thấy DO: ${escapeHtml(doNo)}</div>`;
    return;
  }

  resultDiv.innerHTML = renderCard(found);
}

function renderCard(row) {
  return `
    <div class="card">
      <div class="card-header">
        <div class="small">DO No.</div>
        <div class="do-title">${escapeHtml(row["DO No."] || "")}</div>
      </div>

      <div class="main-info">
        <div class="info-box primary">
          <div class="info-label">ID Store</div>
          <div class="info-value">${escapeHtml(row["Ship-To ID"] || "-")}</div>
          <div class="store-name">${escapeHtml(row["Shipto Nm"] || "")}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Số kiện</div>
          <div class="info-value">${escapeHtml(row["Số kiện"] || "-")}</div>
        </div>

        <div class="info-box warning">
          <div class="info-label">Vị trí</div>
          <div class="info-value">${escapeHtml(row["Vị trí"] || "-")}</div>
        </div>
      </div>
    </div>
  `;
}

function clearSearch() {
  lastScannedValue = "";
  lastSearchTime = 0;
  document.getElementById("doInput").value = "";
  document.getElementById("result").innerHTML = `<div class="status">Sẵn sàng scan DO</div>`;
  document.getElementById("doInput").focus();
}

function cleanDO(value) {
  return String(value || "")
    .trim()
    .replace(/\.0$/, "")
    .replace(/\s+/g, "")
    .toUpperCase();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>
</body>
</html>
